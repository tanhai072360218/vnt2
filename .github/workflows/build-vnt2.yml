name: Build VNT2 IPK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Download vnt 2.0.0 (aarch64)
        run: |
          # 1. 修正官方下载地址与格式
          wget -O vnt.tar.xz https://github.com/vnt-dev/vnt/releases/download/2.0.0/vnt-2.0.0-linux-aarch64.tar.xz
          # 2. 用 xJf 解压 xz 格式包
          tar xJf vnt.tar.xz
          mv vnt-2.0.0-linux-aarch64/vnt-cli vnt
          chmod +x vnt

      - name: Make IPK package
        run: |
          NAME=vnt2
          VER=2.0.0
          REL=1
          ARCH=aarch64_cortex-a53
          DIR="${NAME}_${VER}-${REL}_${ARCH}"

          # 标准 OpenWrt IPK 结构（CONTROL 目录，非 DEBIAN）
          mkdir -p "$DIR/CONTROL"
          mkdir -p "$DIR/usr/bin"
          mkdir -p "$DIR/etc/init.d"
          mkdir -p "$DIR/etc/config"

          # 修复 CONTROL 文件（OpenWrt 标准）
          cat > "$DIR/CONTROL/control" << EOF
          Package: vnt2
          Version: $VER-$REL
          Architecture: $ARCH
          Maintainer: GitHub Actions
          Depends: kmod-tun
          Section: net
          Priority: optional
          Homepage: https://github.com/vnt-dev/vnt
          Description: VNT 2.0 virtual network tunnel for OpenWrt
          EOF

          # 自启动脚本（PROCD 标准，适配 OpenWrt 24.10）
          cat > "$DIR/etc/init.d/vnt" << 'EOF'
          #!/bin/sh /etc/rc.common
          USE_PROCD=1
          START=99

          start_service() {
            config_load vnt
            config_get auth_key main auth_key "123456"
            config_get port main port "28976"

            cat > /tmp/vnt.json << JSON
          {
            "listen": ":$port",
            "auth_key": "$auth_key",
            "relay": ["https://relay.rustvnt.com"]
          }
          JSON

            procd_open_instance
            procd_set_param command /usr/bin/vnt
            procd_set_param args -c /tmp/vnt.json
            procd_set_param respawn
            procd_close_instance
          }
          EOF
          chmod 755 "$DIR/etc/init.d/vnt"

          # UCI 配置文件
          cat > "$DIR/etc/config/vnt" << EOF
          config main
                  option auth_key '123456'
                  option port '28976'
          EOF

          # 复制二进制并赋权
          cp vnt "$DIR/usr/bin/"
          chmod 755 "$DIR/usr/bin/vnt"

          # 标准 OpenWrt IPK 打包（CONTROL 目录）
          cd "$DIR"
          tar zcf "../${NAME}_${VER}-${REL}_${ARCH}.ipk" --numeric-owner --owner=0 --group=0 *
          cd ..

      - name: Upload IPK
        uses: actions/upload-artifact@v4
        with:
          name: vnt2-ipk
          path: "*.ipk"
