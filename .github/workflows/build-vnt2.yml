name: Build VNT2 IPK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Download vnt2.0.0
        run: |
          wget -O vnt.tar.gz https://github.com/vnt-dev/vnt/releases/download/2.0.0/vnt-2.0.0-linux-aarch64.tar.gz
          tar zxf vnt.tar.gz
          mv vnt-2.0.0-linux-aarch64/vnt-cli vnt
          chmod +x vnt

      - name: Make IPK package
        run: |
          NAME=vnt2
          VER=2.0.0
          REL=1
          ARCH=aarch64_cortex-a53
          DIR=$NAME\_$VER-$REL\_$ARCH

          mkdir -p $DIR/DEBIAN
          mkdir -p $DIR/usr/bin
          mkdir -p $DIR/etc/init.d
          mkdir -p $DIR/etc/config

          cat > $DIR/DEBIAN/control << EOF
          Package: vnt2
          Version: $VER-$REL
          Architecture: $ARCH
          Maintainer: build
          Depends: kmod-tun
          Section: net
          Priority: optional
          Homepage: https://github.com/vnt-dev/vnt
          Description: VNT 2.0 virtual network tunnel
          EOF

          cat > $DIR/etc/init.d/vnt << EOF
          #!/bin/sh /etc/rc.common
          USE_PROCD=1
          START=99

          start_service() {
            config_load vnt
            config_get auth_key main auth_key "123456"
            config_get port main port "28976"

            cat > /tmp/vnt.json << JSON
          {
            "listen": ":$port",
            "auth_key": "$auth_key",
            "relay": ["https://relay.rustvnt.com"]
          }
          JSON

            procd_open_instance
            procd_set_param command /usr/bin/vnt
            procd_set_param args -c /tmp/vnt.json
            procd_set_param respawn
            procd_close_instance
          }
          EOF

          chmod 755 $DIR/etc/init.d/vnt

          cat > $DIR/etc/config/vnt << EOF
          config main
                  option auth_key '123456'
                  option port '28976'
          EOF

          cp vnt $DIR/usr/bin/
          chmod 755 $DIR/usr/bin/vnt

          cd $DIR
          tar zcf ../$NAME\_$VER-$REL\_$ARCH.ipk ./
          cd ..

      - name: Upload IPK
        uses: actions/upload-artifact@v4
        with:
          name: vnt2-ipk
          path: "*.ipk"
